<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMI Application Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- MAIN FORM -->
<div id="formContainer" class="container">
    <h1>EMI Application Form</h1>
    <form id="emiForm">
        <!-- 1. Customer Details -->
        <fieldset><legend>1. Customer Details</legend>
            <input type="text" id="fullName" placeholder="Full Name" required>
            <input type="tel" id="mobile" placeholder="Mobile Number" required>
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="date" id="dob" required>
            <select id="gender" required><option value="">Select Gender</option><option>Male</option><option>Female</option><option>Other</option></select>
            <input type="text" id="fatherName" placeholder="Father's Name" required>
            <input type="text" id="occupation" placeholder="Occupation" required>
            <input type="number" id="income" placeholder="Monthly Income (₹)" required>
        </fieldset>

        <!-- 2. Address Details -->
        <fieldset><legend>2. Address Details</legend>
            <input type="text" id="houseNo" placeholder="House/Flat No." required>
            <input type="text" id="street" placeholder="Street/Locality" required>
            <input type="text" id="city" placeholder="City" required>
            <input type="text" id="district" placeholder="District" required>
            <input type="text" id="state" placeholder="State" required>
            <input type="text" id="pincode" placeholder="PIN Code" required>
        </fieldset>

        <!-- 3. Identity Details -->
        <fieldset><legend>3. Identity Details</legend>
            <input type="text" id="aadhaar" placeholder="Aadhaar Number" required>
            <input type="text" id="pan" placeholder="PAN Number" required>
        </fieldset>

        <!-- 4. Product Details -->
        <fieldset><legend>4. Product Details</legend>
            <input type="text" id="productName" placeholder="Product Name" required>
            <input type="number" id="productPrice" placeholder="Product Price (₹)" required>
            <input type="number" id="downPayment" placeholder="Down Payment (₹)" required>
            <select id="emiPlan" required>
                <option value="">Select EMI Plan</option>
                <option>3 Months</option><option>6 Months</option><option>9 Months</option>
                <option>12 Months</option><option>18 Months</option><option>24 Months</option>
            </select>
        </fieldset>

        <!-- 5 & 6. Verifications -->
        <fieldset><legend>5 & 6. Order & Payment Verification</legend>
            <input type="text" id="orderId" placeholder="Dukaan Order ID" required>
            <input type="file" id="orderScreenshot" accept="image/*" required>
            <input type="text" id="txnId" placeholder="Payment Transaction ID / UTR" required>
            <input type="file" id="paymentScreenshot" accept="image/*" required>
        </fieldset>

        <!-- 7. Emergency Contacts -->
        <fieldset><legend>7. Emergency Contacts</legend>
            <input type="text" id="brotherName" placeholder="Brother Name" required>
            <input type="tel" id="brotherMobile" placeholder="Brother Mobile" required>
            <input type="text" id="parentName" placeholder="Parent Name" required>
            <input type="tel" id="parentMobile" placeholder="Parent Mobile" required>
            <input type="text" id="friendName" placeholder="Friend Name" required>
            <input type="tel" id="friendMobile" placeholder="Friend Mobile" required>
        </fieldset>

        <!-- 8. Document Upload -->
        <fieldset><legend>8. Document Upload</legend>
            <label>Aadhaar Front:</label><input type="file" id="aadhaarFront" accept="image/*" required>
            <label>Aadhaar Back:</label><input type="file" id="aadhaarBack" accept="image/*" required>
            <label>PAN Card:</label><input type="file" id="panCard" accept="image/*" required>
            <label>Customer Selfie (Live Camera):</label><input type="file" id="selfie" accept="image/*" capture="user" required>
        </fieldset>

        <!-- 9. Permissions & Declaration -->
        <fieldset><legend>9. Permissions & Declaration</legend>
            <button type="button" id="locBtn" onclick="getLocation()">📍 Fetch Current Location</button>
            <input type="text" id="location" placeholder="Location will appear here" readonly>
            <label class="checkbox-label"><input type="checkbox" id="declaration" required> I hereby declare that all the information provided is true and correct.</label>
        </fieldset>

        <!-- 10. Submit -->
        <button type="submit" id="submitBtn" class="submit-btn">Submit EMI Application</button>
    </form>
</div>

<!-- LOADING SCREEN -->
<div id="loadingScreen" class="screen hidden">
    <div class="spinner"></div>
    <h2>Processing your application...</h2>
</div>

<!-- SUCCESS SCREEN -->
<div id="successScreen" class="screen hidden">
    <h2>✅ Application Submitted Successfully!</h2>
    <p>Your Application ID:</p>
    <h3 id="appId"></h3>
    <button onclick="copyId()">📋 Copy Application ID</button>
    <button onclick="downloadReceipt()">📥 Download Receipt</button>
    <button onclick="backToHome()" class="back-btn">🏠 Back to Home</button>
</div>

<script src="script.js"></script>
</body>
</html>
